version: '3.8'

services:
  # ── DJMAudio Streamlit Inventory Web App ─────────────────
  djm-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djm-web
    restart: unless-stopped
    command: ["streamlit", "run", "app.py", "--server.port=8080", "--server.address=0.0.0.0", "--server.baseUrlPath=/djm-web"]
    networks:
      - nexus-network

  # ── DJMAudio Telegram Bot Server ─────────────────────────
  djm-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: djm-bot
    restart: unless-stopped
    environment:
      DATABASE_PATH: "/app/data/bot_memory.db"
    volumes:
      - djm_bot_data:/app/data
    networks:
      - nexus-network

volumes:
  djm_bot_data:
    driver: local

networks:
  nexus-network:
    external: true
